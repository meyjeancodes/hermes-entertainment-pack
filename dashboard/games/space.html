<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;user-select:none}
canvas{display:block}
</style></head>
<body><canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=Math.min(window.innerWidth*.97,480),H=Math.min(window.innerHeight*.97,600);
cv.width=W;cv.height=H;

let player,bullets,enemies,ebullets,stars,score,lives,wave,state,keys={},fireCD=0,eFireCD=0,frameN=0;

function mkStars(){return Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+.3,sp:Math.random()*.4+.1}))}
function mkEnemies(w){
  const rows=2+Math.min(w,3),cols=6+Math.min(w,4),es=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)
    es.push({x:c*(W/(cols+2))+W/(cols+2),y:36+r*28,vx:.4+w*.15,alive:true,frame:0});
  return es;
}
function init(){
  player={x:W/2,y:H-30,w:20,h:14};
  bullets=[];ebullets=[];
  stars=mkStars();
  score=0;lives=3;wave=1;
  enemies=mkEnemies(1);
  state='run';
}

function update(){
  frameN++;
  stars.forEach(s=>{s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W}});
  const spd=2.5;
  if((keys['ArrowLeft']||keys['a'])&&player.x>12)player.x-=spd;
  if((keys['ArrowRight']||keys['d'])&&player.x<W-12)player.x+=spd;
  fireCD=Math.max(0,fireCD-1);
  if((keys[' ']||keys['z']||keys['Z'])&&fireCD===0){bullets.push({x:player.x,y:player.y-8,vy:-7});fireCD=12}
  bullets=bullets.filter(b=>{b.y+=b.vy;return b.y>-5});
  ebullets=ebullets.filter(b=>{b.y+=b.vy;return b.y<H+5});
  let hit=false;
  enemies.forEach(e=>{if(!e.alive)return;e.x+=e.vx;if(e.x>W-10||e.x<10)hit=true;e.frame++;});
  if(hit)enemies.forEach(e=>{e.vx*=-1;e.y+=8});
  eFireCD=Math.max(0,eFireCD-1);
  if(eFireCD===0&&enemies.some(e=>e.alive)){
    const alive=enemies.filter(e=>e.alive);
    const shooter=alive[Math.floor(Math.random()*alive.length)];
    ebullets.push({x:shooter.x,y:shooter.y+8,vy:2.5+wave*.3});
    eFireCD=40-wave*3;
  }
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(!e.alive)return;
      if(Math.abs(b.x-e.x)<14&&Math.abs(b.y-e.y)<10){e.alive=false;b.y=-999;score+=10*wave}
    });
  });
  ebullets.forEach(b=>{
    if(Math.abs(b.x-player.x)<14&&Math.abs(b.y-player.y)<10){b.y=H+99;lives--;if(lives<=0)state='over'}
  });
  if(enemies.some(e=>e.alive&&e.y>H-40)){state='over'}
  if(!enemies.some(e=>e.alive)){wave++;enemies=mkEnemies(wave);ebullets=[]}
}

function drawHUD(){
  const fs=Math.max(8,Math.round(H*.025));
  ctx.font=`${fs}px 'Courier New',monospace`;
  ctx.fillStyle='rgba(0,255,65,0.6)';ctx.shadowColor='#00ff41';ctx.shadowBlur=4;
  ctx.textAlign='left'; ctx.fillText(`SCORE: ${score}`,6,fs+4);
  ctx.textAlign='center';ctx.fillText(`WAVE ${wave}`,W/2,fs+4);
  ctx.textAlign='right'; ctx.fillText(`LIVES: ${lives}`,W-6,fs+4);
  ctx.shadowBlur=0;
}

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.s*.4})`;ctx.fillRect(s.x,s.y,s.s,s.s)});
  enemies.forEach(e=>{
    if(!e.alive)return;
    const t=Math.floor(e.frame/15)%2;
    ctx.fillStyle='#00ff41';ctx.shadowColor='#00ff41';ctx.shadowBlur=6;
    ctx.fillRect(e.x-8,e.y-5,16,10);
    if(t===0){ctx.fillRect(e.x-11,e.y+2,4,5);ctx.fillRect(e.x+7,e.y+2,4,5)}
    else{ctx.fillRect(e.x-9,e.y+5,4,5);ctx.fillRect(e.x+5,e.y+5,4,5)}
    ctx.shadowBlur=0;
  });
  if(state==='run'||state==='over'){
    ctx.fillStyle='#00aaff';ctx.shadowColor='#00aaff';ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(player.x,player.y-player.h);ctx.lineTo(player.x-player.w/2,player.y+4);ctx.lineTo(player.x+player.w/2,player.y+4);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.fillStyle='#ffff00';ctx.shadowColor='#ffff00';ctx.shadowBlur=6;
  bullets.forEach(b=>ctx.fillRect(b.x-1.5,b.y-5,3,8));
  ctx.fillStyle='#ff0055';ctx.shadowColor='#ff0055';
  ebullets.forEach(b=>ctx.fillRect(b.x-1.5,b.y-4,3,7));
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,255,65,.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H-20);ctx.lineTo(W,H-20);ctx.stroke();
  if(state==='run')drawHUD();
  if(state!=='run'){
    ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.shadowBlur=12;
    const titleFs=Math.round(H*.055);
    if(state==='over'){
      ctx.fillStyle='#ff0055';ctx.shadowColor='#ff0055';
      ctx.font=`bold ${titleFs}px 'Courier New'`;ctx.fillText('GAME OVER',W/2,H/2-18);
      ctx.shadowBlur=0;ctx.fillStyle='rgba(0,255,65,.8)';
      ctx.font=`${Math.round(H*.038)}px 'Courier New'`;ctx.fillText(`SCORE: ${score}`,W/2,H/2+10);
    } else {
      ctx.fillStyle='#00ff41';ctx.shadowColor='#00ff41';
      ctx.font=`bold ${titleFs}px 'Courier New'`;ctx.fillText('SPACE RAID',W/2,H/2-22);
      ctx.shadowBlur=0;ctx.fillStyle='rgba(0,255,65,.7)';
      ctx.font=`${Math.round(H*.038)}px 'Courier New'`;ctx.fillText('PROTECT EARTH',W/2,H/2+8);
    }
    ctx.shadowBlur=0;ctx.fillStyle='rgba(0,255,65,.5)';
    ctx.font=`${Math.round(H*.032)}px 'Courier New'`;
    ctx.fillText('Z · SPACE · CLICK TO START',W/2,H/2+34);
    ctx.font=`${Math.round(H*.024)}px 'Courier New'`;ctx.fillStyle='rgba(0,255,65,.3)';
    ctx.fillText('← → MOVE · Z OR SPACE TO FIRE',W/2,H/2+54);
  }
}

init();state='wait';
let last=0;
function loop(ts){
  if(state==='run'&&ts-last>16){update();last=ts}
  draw();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if((e.key==='z'||e.key==='Z'||e.key===' ')&&state!=='run'){init();return}
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false});
cv.addEventListener('click',()=>{if(state!=='run')init()});
</script></body></html>
