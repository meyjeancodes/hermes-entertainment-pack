<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0014;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',Courier,monospace;user-select:none}
canvas{display:block;position:absolute;inset:0}
#ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 0 32px;pointer-events:none}
#playBtn{pointer-events:auto;padding:10px 30px;background:rgba(185,103,255,0.12);border:1px solid rgba(185,103,255,0.45);color:#b967ff;font-family:'Courier New',monospace;font-size:11px;font-weight:bold;letter-spacing:0.22em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all 0.2s;outline:none}
#playBtn:hover{background:rgba(185,103,255,0.28);border-color:#b967ff;box-shadow:0 0 22px rgba(185,103,255,0.35)}
#status{font-size:8.5px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,113,206,0.5);margin-top:9px;text-align:center}
</style></head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button id="playBtn">▶ &nbsp; TUNE IN TO VAPOR FM</button>
  <div id="status">HERMES WAVE RADIO &nbsp;·&nbsp; SYNTHWAVE &nbsp;·&nbsp; 24/7</div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
cv.width=window.innerWidth;cv.height=window.innerHeight;
const W=cv.width,H=cv.height;

let playing=false,audio=null;
const btn=document.getElementById('playBtn');
const status=document.getElementById('status');

const STREAMS=[
  'https://ice1.somafm.com/digitalis-128-mp3',
  'https://ice4.somafm.com/digitalis-128-mp3',
  'https://ice6.somafm.com/digitalis-128-mp3',
];

btn.addEventListener('click',async()=>{
  if(playing){
    if(audio){audio.pause();audio.src=''}
    playing=false;
    btn.textContent='▶  TUNE IN TO VAPOR FM';
    status.textContent='HERMES WAVE RADIO · SYNTHWAVE · 24/7';
    return;
  }
  btn.textContent='◌  CONNECTING...';
  audio=new Audio();audio.volume=0.75;
  let ok=false;
  for(const url of STREAMS){
    try{
      audio.src=url;
      await audio.play();
      ok=true;break;
    }catch(e){/* try next */}
  }
  if(ok){
    playing=true;
    btn.textContent='◼  NOW PLAYING — CLICK TO STOP';
    status.textContent='♫  SOMA FM — DIGITALIS (SYNTHWAVE · CYBERPUNK)';
  }else{
    btn.textContent='⚠  STREAM UNAVAILABLE — RETRY';
    status.textContent='CHECK CONNECTION · TRY AGAIN';
  }
});

// ── Stars ────────────────────────────────────────────
const STARS=Array.from({length:90},()=>({
  x:Math.random()*W,y:Math.random()*H*0.5,
  r:Math.random()*1.1+0.2,
  a:Math.random()*0.5+0.2,
  spd:Math.random()*2+0.8,
  off:Math.random()*Math.PI*2
}));

// ── Particles ────────────────────────────────────────
const PARTS=Array.from({length:28},()=>mkPart());
function mkPart(){
  return{
    x:Math.random()*W,y:H*0.45+Math.random()*H*0.1,
    vx:(Math.random()-0.5)*0.4,vy:-(Math.random()*0.6+0.15),
    r:Math.random()*2+0.4,
    col:Math.random()<0.5?'255,113,206':'1,205,254',
    life:Math.random()*0.5+0.5,decay:0.003+Math.random()*0.002
  };
}

// ── Draw ─────────────────────────────────────────────
function frame(ts){
  const t=ts*0.001;

  // Background
  ctx.fillStyle='#0d0014';ctx.fillRect(0,0,W,H);

  // Sky stars
  STARS.forEach(s=>{
    const a=s.a*(0.5+0.5*Math.sin(t*s.spd+s.off));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();
  });

  // ── Synthwave sun ──
  const sunX=W/2,sunY=H*0.48,sunR=Math.min(W,H)*0.19;

  // Sun glow
  const sg=ctx.createRadialGradient(sunX,sunY,sunR*0.2,sunX,sunY,sunR*2.8);
  sg.addColorStop(0,'rgba(255,113,206,0.22)');
  sg.addColorStop(0.5,'rgba(185,103,255,0.08)');
  sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;ctx.fillRect(sunX-sunR*3,sunY-sunR*3,sunR*6,sunR*6);

  // Sun semi-circle gradient
  const sg2=ctx.createLinearGradient(sunX,sunY-sunR,sunX,sunY);
  sg2.addColorStop(0,'#ff71ce');sg2.addColorStop(0.55,'#ff58aa');sg2.addColorStop(1,'#b967ff');
  ctx.save();
  ctx.beginPath();ctx.arc(sunX,sunY,sunR,Math.PI,0,false);ctx.closePath();
  ctx.fillStyle=sg2;ctx.fill();

  // Horizontal stripes over sun
  ctx.fillStyle='#0d0014';
  const stripes=9;
  for(let i=1;i<=stripes;i++){
    const p=i/(stripes+1);
    const sy=sunY-sunR*(1-p)*(1-p);
    const th=sunR*0.032*(1+p);
    ctx.fillRect(sunX-sunR,sy-th/2,sunR*2,th);
  }
  ctx.restore();

  // Horizon line
  ctx.beginPath();ctx.strokeStyle='rgba(255,113,206,0.55)';ctx.lineWidth=1.2;
  ctx.moveTo(0,sunY);ctx.lineTo(W,sunY);ctx.stroke();

  // ── Perspective grid ──
  const gy=sunY;
  const vp={x:W/2,y:gy};

  // Ground fill
  const gfill=ctx.createLinearGradient(0,gy,0,H);
  gfill.addColorStop(0,'rgba(20,0,40,0)');
  gfill.addColorStop(0.35,'rgba(30,0,60,0.35)');
  gfill.addColorStop(1,'rgba(10,0,22,0.85)');
  ctx.fillStyle=gfill;ctx.fillRect(0,gy,W,H-gy);

  // Vertical lines
  const nv=18;
  ctx.lineWidth=0.7;
  for(let i=0;i<=nv;i++){
    const fx=i/nv;
    const bx=fx*W;
    const nx=vp.x+(bx-vp.x)*0.018;
    const a=0.18+0.22*Math.abs(fx-0.5)*2;
    ctx.strokeStyle=`rgba(185,103,255,${a})`;
    ctx.beginPath();ctx.moveTo(nx,gy);ctx.lineTo(bx,H);ctx.stroke();
  }

  // Horizontal scrolling lines
  const scrollProg=(t*0.13)%1;
  const nh=16;
  for(let i=0;i<=nh;i++){
    const p=((i/nh)+scrollProg)%1;
    const y=gy+(H-gy)*p*p;
    const a=0.12+p*0.55;
    ctx.strokeStyle=`rgba(185,103,255,${a})`;ctx.lineWidth=0.6+p*0.4;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }

  // ── Particles ──
  PARTS.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0){PARTS[i]=mkPart();return}
    ctx.globalAlpha=p.life*0.75;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgb(${p.col})`;ctx.fill();
    ctx.globalAlpha=1;
  });

  // ── Bar visualizer ──
  const bars=44;
  const bw=(W*0.7)/bars;
  const bx0=W*0.15;
  const byBase=H-52;
  const maxBH=H*0.16;

  for(let i=0;i<bars;i++){
    const fi=i/bars;
    // Fake but natural-looking spectrum
    const bh=maxBH*Math.max(0.04,
      0.38*Math.abs(Math.sin(t*1.4+fi*7.5))+
      0.28*Math.abs(Math.sin(t*1.9+fi*5.1+1.1))+
      0.20*Math.abs(Math.sin(t*0.75+fi*11.3))+
      0.14*Math.abs(Math.sin(t*2.8+fi*3.3+2.2))
    );
    const x=bx0+i*bw;
    const barG=ctx.createLinearGradient(x,byBase-bh,x,byBase);
    const topCol=fi<0.5?`rgba(255,113,206,0.9)`:`rgba(1,205,254,0.9)`;
    const botCol=fi<0.5?`rgba(185,103,255,0.15)`:`rgba(185,103,255,0.15)`;
    barG.addColorStop(0,topCol);barG.addColorStop(0.6,'rgba(185,103,255,0.6)');barG.addColorStop(1,botCol);
    ctx.fillStyle=barG;
    ctx.shadowColor=fi<0.5?'#ff71ce':'#01cdfe';ctx.shadowBlur=7;
    ctx.fillRect(x+0.5,byBase-bh,bw-1.5,bh);
  }
  ctx.shadowBlur=0;

  // ── Title & branding ──
  const fs=n=>Math.round(H*n);
  ctx.textAlign='center';

  ctx.font=`900 ${fs(0.068)}px 'Courier New',monospace`;
  ctx.fillStyle='rgba(255,113,206,0.92)';
  ctx.shadowColor='#ff71ce';ctx.shadowBlur=26;
  ctx.fillText('VAPOR FM',W/2,fs(0.1));
  ctx.shadowBlur=0;

  ctx.font=`${fs(0.022)}px 'Courier New',monospace`;
  ctx.fillStyle='rgba(1,205,254,0.6)';
  ctx.fillText('HERMES WAVE RADIO  ·  ヘルメス  ·  FM 88.4',W/2,fs(0.1)+fs(0.038));

  // Frequency text (aesthetic) bottom right
  ctx.textAlign='right';ctx.font=`${fs(0.016)}px 'Courier New',monospace`;
  ctx.fillStyle='rgba(185,103,255,0.35)';
  ctx.fillText('DIGITALIS / SYNTHWAVE / CYBERPUNK',W-16,H-16);
  ctx.textAlign='left';

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
